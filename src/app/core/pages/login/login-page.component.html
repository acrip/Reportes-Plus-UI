<div class="flex flex-col min-h-screen">
  <div class="flex flex-1">
    <div class="flex w-1/2 items-center justify-center bg-gray-100 p-6">
      <div class="w-full max-w-md space-y-6">
        <h2 class="text-3xl font-bold text-left text-[#000066]">
          Inicio de sesión
        </h2>
        <form class="space-y-4">
          <button type="button" (click)="signInWithGoogle()"
            class="flex items-center justify-center gap-2 w-full rounded-full border bg-white px-4 py-2 shadow text-[#000066] hover:bg-gray-100 transition">
            <img src="https://img.icons8.com/color/22/000000/google-logo.png" />
            Continuar con Google
          </button>
        </form>
      </div>
    </div>
    <div class="hidden w-1/2 bg-cover bg-center lg:flex" style="background-image: url('/image-login.webp')"></div>
  </div>
</div>
