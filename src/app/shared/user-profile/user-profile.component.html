@if (isAuthenticated) {
  <div class="flex items-center gap-3 cursor-pointer" (click)="toggleDropdown()">
    <img [ngSrc]="userProfile.picture" alt="" class="w-12 h-12 rounded-full" width="24" height="24"/>

    <div class="flex flex-col">
      <span class="font-bold text-uniblue-950">{{ userProfile.name }}</span>
      <span class="text-sm text-gray-600">{{ userProfile.role }}</span>
    </div>
  </div>
  @if (isOpen) {
    <div class="dropdown-menu">
      <button class="logout-button" (click)="logOut()">Cerrar Sesión</button>
    </div>
  }
}
