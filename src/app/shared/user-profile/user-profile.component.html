@if (isLoading()) {
  <!-- Skeleton loader -->
  <div class="flex items-center gap-3 animate-pulse">
    <div class="w-12 h-12 rounded-full bg-gray-300"></div>
    <div class="flex flex-col gap-2">
      <div class="h-4 w-24 bg-gray-300 rounded"></div>
      <div class="h-3 w-16 bg-gray-200 rounded"></div>
    </div>
  </div>
} @else if (userProfile()) {
  <div class="flex items-center gap-3 cursor-pointer" (click)="toggleDropdown()">
    <img
      [ngSrc]="displayPicture()"
      [alt]="'Foto de ' + displayName()"
      class="w-12 h-12 rounded-full object-cover"
      width="48"
      height="48"
    />

    <div class="flex flex-col">
      <span class="font-bold text-uniblue-950">
        {{ displayName() }}
      </span>
      <span class="text-sm text-gray-600">
        {{ displayRole() }}
      </span>
    </div>
  </div>

  @if (isOpen) {
    <div class="dropdown-menu absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg py-1 z-10">
      <button
        class="logout-button w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100"
        (click)="logOut()"
      >
        Cerrar Sesión
      </button>
    </div>
  }
} @else {
  <div class="text-gray-500">No hay perfil disponible</div>
}
